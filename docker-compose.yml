version: '3.8'

services:
  mongodb:
    image: mongo
    container_name: mongodb
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=woovi-playground
    restart: always

  mongo-init:
    image: mongo
    container_name: mongo-init
    restart: "no"
    depends_on:
      - mongodb
    command: >
      bash -c "sleep 5 && mongosh --host mongodb:27017 --eval 'try { rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"localhost:27017\" }] }) } catch(e) { console.log(e) }'"

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
