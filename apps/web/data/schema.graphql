"""Root queries"""
type Query {
  healthCheck: String
}

"""Root mutations"""
type Mutation {
  LoginMutation(input: LoginMutationInput!): LoginMutationPayload
  RegisterMutation(input: RegisterMutationInput!): RegisterMutationPayload
  SendEmailVerificationMutation(input: SendEmailVerificationMutationInput!): SendEmailVerificationMutationPayload
  ConfirmEmailMutation(input: ConfirmEmailMutationInput!): ConfirmEmailMutationPayload
  CreateIdempotencyKeyMutation(input: CreateIdempotencyKeyMutationInput!): CreateIdempotencyKeyMutationPayload
  CreateTransactionMutation(input: CreateTransactionMutationInput!): CreateTransactionMutationPayload
}

type LoginMutationPayload {
  token: String
  clientMutationId: String
}

input LoginMutationInput {
  email: String!
  password: String!
  clientMutationId: String
}

type RegisterMutationPayload {
  success: Boolean
  clientMutationId: String
}

input RegisterMutationInput {
  fullName: String!
  email: String!
  cpf: String!
  password: String!
  clientMutationId: String
}

type SendEmailVerificationMutationPayload {
  success: Boolean
  clientMutationId: String
}

input SendEmailVerificationMutationInput {
  email: String!
  clientMutationId: String
}

type ConfirmEmailMutationPayload {
  success: Boolean
  clientMutationId: String
}

input ConfirmEmailMutationInput {
  token: String!
  clientMutationId: String
}

type CreateIdempotencyKeyMutationPayload {
  key: String!
  clientMutationId: String
}

input CreateIdempotencyKeyMutationInput {
  clientMutationId: String
}

type CreateTransactionMutationPayload {
  transactionId: String!
  clientMutationId: String
}

input CreateTransactionMutationInput {
  amount: Int!
  targetUserId: String!
  description: String
  clientMutationId: String
}